name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Debug)
        run: |
          xcodebuild \
            -project Murmur.xcodeproj \
            -scheme Murmur \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Build (Release)
        run: |
          xcodebuild \
            -project Murmur.xcodeproj \
            -scheme Murmur \
            -configuration Release \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Run unit tests (if a test scheme exists)
        run: |
          if xcodebuild -project Murmur.xcodeproj -list | grep -qx '        MurmurTests'; then
            xcodebuild \
              -project Murmur.xcodeproj \
              -scheme MurmurTests \
              -configuration Debug \
              test \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO
          else
            echo "No MurmurTests scheme found yet; skipping test step."
          fi
