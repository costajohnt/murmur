name: Murmur
options:
  bundleIdPrefix: com.costajohnt
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: 0.15.4

targets:
  Murmur:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Sources/Assets.xcassets
        buildPhase: resources
      - path: Tests/fixtures/fixture.wav
        buildPhase: resources
    dependencies:
      - package: FluidAudio
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: Murmur
        CFBundleDisplayName: Murmur
        # Regular app (no LSUIElement): dock icon + app switcher + real main
        # menu. Closing the History window keeps the pill/menubar running; only
        # ⌘Q quits (docs/pill-app-redesign.md §A).
        NSMicrophoneUsageDescription: "Murmur transcribes your speech locally."
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.costajohnt.murmur
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Development"
        # NOTE: the team ID is the cert's OU (554J63A469), NOT the "([redacted])"
        # suffix in the cert CN — that's the certificate-holder ID. Using
        # [redacted] here makes xcodebuild fail with "No signing certificate
        # 'Mac Development' found".
        DEVELOPMENT_TEAM: 554J63A469
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"

  # Unit tests for pure logic (audit item A6). No host application: the
  # SwiftUI App entry point makes @testable-importing the Murmur executable
  # target impractical without launching the whole app (mic/hotkey/Ollama
  # side effects). Instead the specific Foundation-only source files under
  # test are compiled a second time directly into this bundle - they have no
  # UI/AVFoundation/networking side effects at import time, only at call
  # time, and the tests below never invoke the networking or mic paths.
  MurmurTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MurmurTests
      - path: Sources/Murmur/CleanupContext.swift
      - path: Sources/Murmur/TranscriptGuard.swift
      - path: Sources/Murmur/Log.swift
      - path: Sources/Murmur/AppSettings.swift
      - path: Sources/Murmur/OllamaClient.swift
      - path: Sources/Murmur/HistoryStore.swift
    settings:
      base:
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.costajohnt.murmur.tests
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: 554J63A469
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
