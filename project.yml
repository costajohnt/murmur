name: Murmur
options:
  bundleIdPrefix: com.costajohnt
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: 0.15.4

targets:
  Murmur:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Sources/Assets.xcassets
        buildPhase: resources
      - path: Tests/fixtures/fixture.wav
        buildPhase: resources
    dependencies:
      - package: FluidAudio
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: Murmur
        CFBundleDisplayName: Murmur
        # Regular app (no LSUIElement): dock icon + app switcher + real main
        # menu. Closing the History window keeps the pill/menubar running; only
        # ⌘Q quits (docs/pill-app-redesign.md §A).
        NSMicrophoneUsageDescription: "Murmur transcribes your speech locally."
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.costajohnt.murmur
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Development"
        # NOTE: the team ID is the cert's OU (554J63A469), NOT the "([redacted])"
        # suffix in the cert CN — that's the certificate-holder ID. Using
        # [redacted] here makes xcodebuild fail with "No signing certificate
        # 'Mac Development' found".
        DEVELOPMENT_TEAM: 554J63A469
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
